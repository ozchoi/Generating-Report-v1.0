name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          rm -rf _site
          mkdir -p _site/sample-data _site/docs
          cp index.html app.js styles.css _site/
          cp -R sample-data/. _site/sample-data/
          cp SECURITY_LIMITATIONS.md _site/
          cp docs/SECURE_BACKEND_PLAN.md _site/docs/
          touch _site/.nojekyll
          cat > _site/deployment.json <<JSON
          {
            "version": "1.5.1",
            "sha": "${GITHUB_SHA}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

      - name: Verify artifact contents
        run: |
          test -f _site/index.html
          test -f _site/app.js
          test -f _site/styles.css
          grep -q "Centre-operated assessment system" _site/index.html
          grep -q "Question Bank / 題目庫" _site/index.html
          grep -q "v=1.5.1" _site/index.html
          grep -q "printRoot" _site/index.html
          grep -q "Prepare Test / 準備測驗" _site/index.html
          grep -q "Begin Test / 正式開始" _site/index.html
          grep -q "Question answers and marking logic are present in the public source" _site/index.html
          grep -q "Topic Performance" _site/index.html
          ! grep -q "Strong / Weak Topic Map" _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
